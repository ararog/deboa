[package]
name = "vamo"
version = "0.0.5"
edition = "2021"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
repository = "https://github.com/ararog/deboa"
homepage = "https://github.com/ararog/deboa"
description = "A rest wrapper for deboa http client."
readme = "README.md"
license = "MIT"
keywords = ["http", "networking", "client", "fetch", "rest-client"]
publish = true
rust-version = "1.64.0"

[dependencies]
base64 = "0.22.1"
deboa = { path = "../deboa", version = "0.0.9" }
deboa-extras = { path = "../deboa-extras", version = "0.0.5", features = ["json"] }
http = "1.4.0"
serde = "1.0.228"
url = "2.5.8"

[dev-dependencies]
deboa-tests = { path = "../deboa-tests", version = "0.0.1" }
httpmock = { version = "0.8.2", features = ["http2"] }
tokio = { version = "1.49.0", features = ["rt-multi-thread"] }

