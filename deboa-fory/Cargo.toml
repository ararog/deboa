[package]
name = "deboa-fory"
version = "0.1.3"
edition = "2021"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
repository = "https://github.com/ararog/deboa"
homepage = "https://github.com/ararog/deboa"
description = "Apache Fory serializer support for Deboa"
readme = "README.md"
license = "MIT"
keywords = ["http", "networking", "rest", "serializer", "fory"]
rust-version = "1.70.0"

[dependencies]
deboa = { path = "../deboa", version = "0.0.9", features = ["http1", "tokio-rt"] }
fory = "0.14.1"
fory-core = "0.14.0"
http = "1.4.0"
 
[dev-dependencies]
httpmock = "0.8.1"
tokio = { version = "1.49.0", features = ["macros"] }
