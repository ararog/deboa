[package]
name = "vamo-macros"
edition = "2021"
version = "0.0.5"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
description = "Macros for quick client development using vamo"
license = "MIT"
repository = "https://github.com/ararog/deboa"
readme = "README.md"
keywords = ["compiler-plugin", "macros", "resources", "http", "rest"]
exclude = [".travis.yml"]
publish = true
rust-version = "1.64.0"

[features]
default = ["json", "_tokio-rt", "_http1", "_tokio-rust-tls"]

# Serialization formats
json = ["deboa-extras/json"]
xml = ["deboa-extras/xml"]
msgpack = ["deboa-extras/msgpack"]

# For testing purposes (internal use only)
_tokio-rt = []
_smol-rt = []
_http1 = []
_http2 = []
_http3 = []
_tokio-rust-tls = []
_smol-rust-tls = []
_tokio-native-tls = []
_smol-native-tls = []

[lib]
proc-macro = true

[dependencies]
deboa = { path = "../deboa", version = "0.0.9" }
deboa-extras = { path = "../deboa-extras", version = "0.0.5", features=["json"] }
vamo = { path = "../vamo", version = "0.0.5" }
proc-macro2 = "1.0.103"
serde = "1.0.228"
syn = { version = "2.0", features = ["full"] }
quote = "1.0.41"
http = "1.4.0"
regex = "1.9.6"
titlecase = "2.2.1"

[dev-dependencies]
deboa-tests = { path = "../deboa-tests", version = "0.0.1" }
tokio = { version = "1.49.0", features = ["rt-multi-thread"] }
