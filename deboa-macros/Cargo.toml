[package]
name = "deboa-macros"
edition = "2021"
version = "0.0.9"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
description = "Request macros for the deboa HTTP client"
license = "MIT"
repository = "https://github.com/ararog/deboa"
readme = "README.md"
keywords = ["compiler-plugin", "macros"]
exclude = [".travis.yml"]
publish = true
rust-version = "1.75.0"


[features]
default = ["json"]
json = ["deboa-extras/json"]
xml = ["deboa-extras/xml"]
msgpack = ["deboa-extras/msgpack"]

[dependencies]
deboa = { version = "0.1.0-beta.5" }
deboa-extras = { version = "0.0.8", features = ["json"] }
http = "1.4.0"
serde = "1.0.228"

[dev-dependencies]
tokio = { version = "1.38.1", features = ["rt-multi-thread"] }


