[package]
name = "deboa-tests"
version = "0.0.1"
edition = "2021"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
repository = "https://github.com/ararog/deboa"
homepage = "https://github.com/ararog/deboa"
description = "Tests for deboa"
readme = "README.md"
license = "MIT"
keywords = ["http", "networking", "client", "fetch", "rest-client"]
publish = false
rust-version = "1.64.0"

[features]
default = ["http1", "tokio-rt"]
tokio-rt = ["tokio"]
smol-rt = ["smol", "smol-hyper", "smol-macros"]

http1 = ["hyper/http1", "hyper-util/http1"]
http2 = ["hyper/http2", "hyper-util/http2"]
http3 = ["h3", "h3-quinn", "quinn"]

[dependencies]
bytes = "1.11.0"
h3 = { version = "0.0.6", optional = true }
h3-quinn = { version = "0.0.5", optional = true }
http = "1.3.1"
http-body-util = "0.1.3"
httpmock = { version = "0.8.2", features = ["http2"] }
hyper = { version = "1.8.1", features = ["http1", "http2", "server"], optional = true }
hyper-util = { version = "0.1.19", features = ["http1", "http2", "server"], optional = true }
mime = "0.3.17"
quinn = { version = "0.10.2", optional = true }
rand = "0.9.2"
serde = "1.0.226"
serde_json = "1.0.145"
smol = { version = "2.0.2", optional = true }
smol-hyper = { version = "0.1.1", optional = true }
smol-macros = { version = "0.1.1", optional = true }
tokio = { version = "1.38.2", optional = true }
url = "2.5.7"
