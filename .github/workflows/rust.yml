name: Rust

permissions:
  contents: read
  
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Build
      run: cargo build --verbose

    - name: Run all tests with tokio
      run: |
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/tokio-rt deboa/tokio-native-tls vamo/http1 vamo/_tokio-rt vamo/_tokio-native-tls vamo-macros/_http1 vamo-macros/_tokio-rt vamo-macros/_tokio-native-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/smol-rt deboa/smol-native-tls vamo/http1 vamo/_smol-rt vamo/_smol-native-tls vamo-macros/_http1 vamo-macros/_smol-rt vamo-macros/_smol-native-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http2 deboa/tokio-rt deboa/tokio-native-tls vamo/http2 vamo/_tokio-rt vamo/_tokio-native-tls vamo-macros/_http2 vamo-macros/_tokio-rt vamo-macros/_tokio-native-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http2 deboa/smol-rt deboa/smol-native-tls vamo/http2 vamo/_smol-rt vamo/_smol-native-tls vamo-macros/_http2 vamo-macros/_smol-rt vamo-macros/_smol-native-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/tokio-rt deboa/tokio-rust-tls vamo/http1 vamo/_tokio-rt vamo/_tokio-rust-tls vamo-macros/_http1 vamo-macros/_tokio-rt vamo-macros/_tokio-rust-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/smol-rt deboa/smol-rust-tls vamo/http1 vamo/_smol-rt vamo/_smol-rust-tls vamo-macros/_http1 vamo-macros/_smol-rt vamo-macros/_smol-rust-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/tokio-rt deboa/tokio-rust-tls vamo/_http2 vamo/_tokio-rt vamo/_tokio-rust-tls vamo-macros/_http2 vamo-macros/_tokio-rt vamo-macros/_tokio-rust-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/smol-rt deboa/smol-rust-tls vamo/_http2 vamo/_smol-rt vamo/_smol-rust-tls vamo-macros/_http2 vamo-macros/_smol-rt vamo-macros/_smol-rust-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http3-tokio deboa/tokio-rt deboa/tokio-rust-tls vamo/_http3 vamo/_tokio-rt vamo/_tokio-rust-tls vamo-macros/_http3 vamo-macros/_tokio-rt vamo-macros/_tokio-rust-tls"

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchains
      run: rustup target add aarch64-linux-android armv7-linux-androideabi

    - name: Install Android NDK
      uses: android-actions/setup-android@v2
      with:
        ndk-version: r25c # Use a compatible NDK version

    - name: Install cargo-ndk and other build dependencies
      run: |
        cargo install cargo-ndk
        sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev gcc

    - name: Build for aarch64-linux-android with cargo-ndk
      run: cargo ndk -t aarch64-linux-android build --release
      env:
        ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        CC_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
        CXX_aarch64_linux_android: ${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang++

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Install Rust toolchains
      run: rustup target add x86_64-pc-windows-msvc

    - name: Build for x86_64-pc-windows-msvc
      run: cargo build --target x86_64-pc-windows-msvc --release
    
    - name: Run all tests
      run: |
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/tokio-rt deboa/tokio-native-tls vamo/http1 vamo/_tokio-rt vamo/_tokio-native-tls vamo-macros/_http1 vamo-macros/_tokio-rt vamo-macros/_tokio-native-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/smol-rt deboa/smol-native-tls vamo/http1 vamo/_smol-rt vamo/_smol-native-tls vamo-macros/_http1 vamo-macros/_smol-rt vamo-macros/_smol-native-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http2 deboa/tokio-rt deboa/tokio-native-tls vamo/http2 vamo/_tokio-rt vamo/_tokio-native-tls vamo-macros/_http2 vamo-macros/_tokio-rt vamo-macros/_tokio-native-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http2 deboa/smol-rt deboa/smol-native-tls vamo/http2 vamo/_smol-rt vamo/_smol-native-tls vamo-macros/_http2 vamo-macros/_smol-rt vamo-macros/_smol-native-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/tokio-rt deboa/tokio-rust-tls vamo/http1 vamo/_tokio-rt vamo/_tokio-rust-tls vamo-macros/_http1 vamo-macros/_tokio-rt vamo-macros/_tokio-rust-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/smol-rt deboa/smol-rust-tls vamo/http1 vamo/_smol-rt vamo/_smol-rust-tls vamo-macros/_http1 vamo-macros/_smol-rt vamo-macros/_smol-rust-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/tokio-rt deboa/tokio-rust-tls vamo/_http2 vamo/_tokio-rt vamo/_tokio-rust-tls vamo-macros/_http2 vamo-macros/_tokio-rt vamo-macros/_tokio-rust-tls"
        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http1 deboa/smol-rt deboa/smol-rust-tls vamo/_http2 vamo/_smol-rt vamo/_smol-rust-tls vamo-macros/_http2 vamo-macros/_smol-rt vamo-macros/_smol-rust-tls"

        cargo test --features "deboa-extras/serialization_all deboa-extras/compression_all deboa/http3-tokio deboa/tokio-rt deboa/tokio-rust-tls vamo/_http3 vamo/_tokio-rt vamo/_tokio-rust-tls vamo-macros/_http3 vamo-macros/_tokio-rt vamo-macros/_tokio-rust-tls"