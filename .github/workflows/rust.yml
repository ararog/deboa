name: Rust

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
  build-android:
    runs-on: ubuntu-latest
    container: instrumentisto/cargo-ndk:latest
    steps:
    - uses: actions/checkout@v6
    - name: Build Android libraries for all targets
      run: cargo ndk -t armv7-linux-androideabi -t aarch64-linux-android -t i686-linux-android -t x86_64-linux-android -- build --release