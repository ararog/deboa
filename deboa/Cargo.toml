[package]
name = "deboa"
version = "0.1.0-beta.1"
edition = "2021"
authors = ["Rogerio Araújo <rogerio.araujo@gmail.com>"]
repository = "https://github.com/ararog/deboa"
homepage = "https://github.com/ararog/deboa"
description = "A friendly rest client on top of hyper."
readme = "README.md"
license = "MIT"
keywords = ["http", "networking", "client", "fetch", "rest-client"]
publish = true
rust-version = "1.75.0"

[features]
default = ["tokio-rt", "http2", "tokio-rust-tls"]

# runtimes
tokio-rt = [
  "tokio/fs",
  "tokio/macros",
  "deboa-tests/tokio-rt",
  "quinn/runtime-tokio",
  "tokio-util/io",
  "rt-gate/tokio-rt",
]
smol-rt = [
  "dep:smol",
  "dep:smol-hyper",
  "dep:async-executor",
  "dep:smol-macros",
  "dep:macro_rules_attribute",
  "deboa-tests/smol-rt",
  "quinn/runtime-smol",
  "rt-gate/smol-rt",
]

# tls
tokio-rust-tls = [
  "dep:rustls",
  "dep:rustls-native-certs",
  "dep:tokio-rustls",
  "dep:webpki-roots",
  "deboa-tests/tokio-rust-tls",
  "rustls-provider",
]

smol-rust-tls = [
  "dep:rustls",
  "dep:rustls-native-certs",
  "dep:futures-rustls",
  "dep:webpki-roots",
  "deboa-tests/smol-rust-tls",
  "rustls-provider",
]

rustls-provider = ["__rustls_awc_lc_rs"]

__rustls_awc_lc_rs = ["futures-rustls/aws-lc-rs"]

__rustls_ring = ["futures-rustls/ring"]

__rustls_rustcrypto = ["dep:rustls-rustcrypto"]

tokio-native-tls = [
  "dep:async-native-tls",
  "async-native-tls/runtime-tokio",
  "deboa-tests/tokio-rust-tls",
]

smol-native-tls = [
  "dep:async-native-tls",
  "async-native-tls/runtime-async-std",
  "deboa-tests/smol-rust-tls",
]

# protocols
http1 = [
  "hyper/http1",
  "hyper-util/http1",
  "deboa-tests/http1",
  "trust-dns-resolver",
  "async-std-resolver",
]
http2 = [
  "hyper/http2",
  "hyper-util/http2",
  "deboa-tests/http2",
  "trust-dns-resolver",
  "async-std-resolver",
]
http3 = [
  "dep:h3",
  "dep:h3-quinn",
  "dep:quinn",
  "deboa-tests/http3",
  "trust-dns-resolver",
  "async-std-resolver",
]

[dependencies]
async-executor = { version = "1.13.3", optional = true }
async-native-tls = { version = "0.5.0", optional = true, default-features = false }
async-std-resolver = { version = "=0.23.2", optional = true }
async-trait = "0.1.89"
base64 = "0.22.1"
bytes = { version = "1.11", optional = false }
cfg-if = "1.0.4"
cookie = "0.15.2"
futures = "0.3.31"
futures-rustls = { version = "0.26.0", optional = true }
h3 = { version = "0.0.8", optional = true }
h3-quinn = { version = "0.0.10", optional = true }
http = "1"
http-body = "1"
http-body-util = "0.1"
hyper = { version = "1.8.1", features = ["client"], default-features = false }
hyper-util = { version = "0.1.20", features = [
  "client",
  "client-legacy",
  "tokio",
], default-features = false }
indexmap = "2.11.4"
log = "0.4.28"
macro_rules_attribute = { version = "0.2.2", optional = true }
minimime = "1.0.0"
mockall = "0.14.0"
quinn = { version = "0.11.7", optional = true, features = ["rustls-aws-lc-rs"] }
rand = "0.9.2"
regex = "1.9.6"
rt-gate = { version = "0.1.3", optional = true, default-features = false }
rustls = { version = "0.23.36", optional = true }
rustls-native-certs = { version = "0.8.0", optional = true }
rustls-pki-types = "1.13.2"
rustls-rustcrypto = { version = "0.0.2-alpha", optional = true }
serde = { version = "1.0.217", features = ["derive"] }
smol = { version = "2.0.2", optional = true }
smol-hyper = { version = "0.1.0", optional = true, features = ["smol"] }
smol-macros = { version = "0.1.1", optional = true }
thiserror = "2.0.17"
time = "=0.2.27"
tokio = { version = "1.38.1", optional = true, default-features = false }
tokio-rustls = { version = "0.26.0", optional = true }
tokio-util = { version = "0.7.11", optional = true }
trust-dns-resolver = { version = "0.23.2", optional = true }
url = "2.5.8"
urlencoding = "2.1.3"
webpki-roots = { version = "1.0.6", optional = true }

[dev-dependencies]
criterion = { version = "0.8.2", features = [
  "html_reports",
  "async",
  "async_smol",
  "async_tokio",
] }
deboa-tests = { path = "../deboa-tests", version = "0.0.1", default-features = false }
futures-util = "0.3.31"
mime = { version = "0.3.17" }
multer = "3.1.0"
smol = "2.0.2"
tokio = { version = "1.49.0" }

[[bench]]
name = "benchmark"
harness = false
